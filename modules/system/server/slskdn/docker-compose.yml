services:
  slskdn:
    image: ghcr.io/snapetech/slskdn:latest
    container_name: slskdn
    ports:
      - "5030:5030"   # web UI
      - "50300:50300" # soulseek listen port
    environment:
      - PUID=1000
      - PGID=100
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_USERNAME=${SLSKD_USERNAME}
      - SLSKD_PASSWORD=${SLSKD_PASSWORD}
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./slskdn.yml:/app/slskd.yml:ro
      - /mnt/music/main:/main:ro
      - /mnt/music/downloads:/downloads:rw
      - /mnt/music/incomplete:/incomplete:rw
      - slskdn-data:/app
    restart: unless-stopped

volumes:
  slskdn-data:
